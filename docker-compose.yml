services:
  # The assistant itself usually runs on the host during development
  # (.venv + streamlit). Enable this service for a fully containerized run:
  #   docker compose --profile app up
  app:
    profiles: ["app"]
    build: .
    ports:
      - "8501:8501"
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage

  # Weekly Township-site monitor (F-04). NOTE: an n8n instance already runs
  # on this machine (self-hosted-ai-starter-kit) at http://localhost:5678 —
  # import n8n/workflow.json there instead of starting this service. Enable
  # with --profile n8n only on a machine without n8n.
  n8n:
    profiles: ["n8n"]
    image: n8nio/n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/New_York
      - TZ=America/New_York
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  n8n_data:
